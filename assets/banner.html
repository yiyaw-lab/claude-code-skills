<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:400px; overflow:hidden; }
  body {
    background:#0a0a0f; position:relative;
    font-family:-apple-system,"SF Pro Display","Segoe UI",sans-serif; color:#fff;
  }
  /* faint dot-grid, masked to fade toward the right */
  .grid {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:28px 28px;
    -webkit-mask-image:linear-gradient(105deg,#000 28%,transparent 78%);
            mask-image:linear-gradient(105deg,#000 28%,transparent 78%);
  }
  /* ONE soft glow, off-canvas top-right */
  .glow {
    position:absolute; top:-240px; right:-160px; width:780px; height:780px; border-radius:50%;
    background:radial-gradient(circle, rgba(245,160,192,0.15), rgba(180,190,254,0.05) 45%, transparent 70%);
  }
  .wrap { position:absolute; inset:0; padding:0 9%; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow {
    display:inline-flex; align-items:center; gap:9px; align-self:flex-start;
    font-family:"SF Mono",ui-monospace,monospace; font-size:13.5px; letter-spacing:0.16em;
    text-transform:uppercase; color:#c9c9d2;
    padding:7px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:999px;
    background:rgba(255,255,255,0.03); margin-bottom:26px;
  }
  .eyebrow .dot { width:7px; height:7px; border-radius:50%; background:linear-gradient(90deg,#fab387,#f5a0c0,#b4befe); }
  h1 { font-size:58px; font-weight:700; letter-spacing:-0.03em; line-height:1.07; }
  h1 .grad { background:linear-gradient(92deg,#fab387,#f5a0c0,#b4befe);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tag { margin-top:22px; font-size:20px; color:#9d9da8; letter-spacing:-0.01em; max-width:740px; }
  .rule { margin-top:26px; width:220px; height:1px; background:rgba(255,255,255,0.14); }
  .kicker { margin-top:15px; font-family:"SF Mono",ui-monospace,monospace; font-size:13.5px; color:#7d7d88; letter-spacing:0.05em; }
</style></head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="wrap">
    <div class="eyebrow"><span class="dot"></span>Claude Code Skills · 17 commands</div>
    <h1>Agents are cheap.<br><span class="grad">Verification</span> is the product.</h1>
    <div class="tag">Slash-commands that make the agent prove its work &mdash; not describe it.</div>
    <div class="rule"></div>
    <div class="kicker">yiya.dev&nbsp;&nbsp;·&nbsp;&nbsp;@yiyadev&nbsp;&nbsp;·&nbsp;&nbsp;building Synapi</div>
  </div>
</body></html>
